name: Fireflies to Notion Sync
on:
  schedule:
    # 8:00, 11:00, 14:00, 17:00, 20:00, 23:00 CET → converted to UTC
    # CET = UTC+1 (winter), CEST = UTC+2 (summer)
    # Using winter (CET) offsets below
    - cron: '0 7 * * *'    #  8:00 CET
  workflow_dispatch: {}     # Manual trigger for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: node src/index.mjs
        env:
          FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUMMARY_PROMPT: ${{ vars.SUMMARY_PROMPT }}
          DELETE_AFTER_SYNC: 'true'
